site_name: JSON2Vec
site_url: https://json2vec.github.io/json2vec/
repo_url: https://github.com/json2vec/json2vec
extra:
  generator: false
  discord_url: https://discord.gg/DVyZUkvTFA
theme:
  name: material
  custom_dir: docs/overrides
  palette:
    scheme: slate
    primary: teal
    accent: deep orange
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
extra_css:
  - assets/stylesheets/docs.css
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences
plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include: ["*.ipynb"]
      include_source: true
      no_prompt: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            filters:
              - "!^_"
            merge_init_into_class: true
            members_order: source
            separate_signature: true
            show_if_no_docstring: true
            show_signature_annotations: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
      - Why JSON2Vec: motivation.md
      - Schemas & Queries: guides/model-schemas.md
      - Model Updates: guides/model-update.ipynb
  - Data Types:
      - Overview: data-types/index.md
      - Array: data-types/array.md
      - Number: data-types/number.md
      - Category: data-types/category.md
      - Set: data-types/set.md
      - DateParts: data-types/dateparts.md
      - Entity: data-types/entity.md
      - Vector: data-types/vector.md
      - Text: data-types/text.md
      - Custom Data Types: guides/tensorfields.ipynb
  - Tutorials:
      - Hello World: tutorials/hello-world.ipynb
      - Masked Pretraining: tutorials/pretraining.ipynb
      - Nested Supervised Training: tutorials/nested-supervised-training.ipynb
      - Supervised Tabular Training: tutorials/supervised-tabular-training.ipynb
      - Serving: tutorials/serving.ipynb
  - Guides:
      - Field Ablation: guides/field-ablation.ipynb
      - Preprocessors: guides/preprocessors.ipynb
      - Tensorfield Extensions: guides/tensorfields.ipynb
  - Reference:
      - API: reference/api.md
